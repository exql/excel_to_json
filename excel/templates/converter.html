<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel a Json</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Inicio</a></li>
            <li><a href="#nosotros">Nosotros</a></li>
            <li><a href="#contacto">Contacto</a></li>
            <li><a href="#preguntas">Preguntas</a></li>
            {% if user.is_authenticated %}
            <li><a href="{% url 'logout' %}" class="logout-button">Cerrar Sesión</a></li>
            {% endif %}
    
        </ul>
    </nav>

    <!-- Cuerpo principal -->
    <div class="main-content">
        <div class="left-column">
            <!-- Aquí irá el logo -->
            <p>Espacio reservado para el logo</p>
        </div>

        <div class="right-column">
            <!-- Formulario para subir Excel -->
            <h1>Adjuntar un archivo Excel</h1>
            <form action="/convertir/" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <!--label for="archivo">Selecciona un archivo Excel:</label--><br>
                <input type="file" id="archivo" name="archivo" accept=".xls,.xlsx" required><br><br>
                <button type="submit">Subir</button>
            </form>
        </div>
    </div>
</body>
